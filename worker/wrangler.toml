name = "temp-email-worker"
main = "src/worker.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
node_compat = true

# ============================================
# D1 DATABASE BINDING
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "temp-email-db"
database_id = "YOUR_D1_DATABASE_ID"  # Replace with: wrangler d1 create temp-email-db

# ============================================
# KV NAMESPACE BINDING
# ============================================
[[kv_namespaces]]
binding = "KV"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with: wrangler kv:namespace create KV

# ============================================
# R2 BUCKET BINDING (Optional - for attachments)
# ============================================
# [[r2_buckets]]
# binding = "R2"
# bucket_name = "temp-email-attachments"

# ============================================
# WORKERS AI BINDING (Optional - for AI extraction)
# ============================================
# [ai]
# binding = "AI"

# ============================================
# ENVIRONMENT VARIABLES
# ============================================
[vars]
# Required Configuration
DOMAINS = "mail.yourdomain.com,yourdomain.com"
PREFIX = "tmp"
ADMIN_PASSWORDS = "change-this-to-secure-password"
JWT_SECRET = "change-this-to-random-secret-string-at-least-32-chars"

# Address Configuration
ENABLE_ADDRESS_PASSWORD = "true"
DISABLE_CUSTOM_ADDRESS_NAME = "false"
CREATE_ADDRESS_DEFAULT_DOMAIN_FIRST = "true"

# Default Domain & Roles
DEFAULT_DOMAINS = ""
USER_ROLES = '[{"name":"vip","domains":["vip.yourdomain.com"],"prefix":"","max_address":10}]'
USER_DEFAULT_ROLE = "default"

# UI Configuration
ANNOUNCEMENT = ""
ALWAYS_SHOW_ANNOUNCEMENT = "false"

# Security
TURNSTILE_SECRET = ""

# Email Sending Configuration
DKIM_PRIVATE_KEY = ""
RESEND_API_KEY = ""
SMTP_HOST = ""
SMTP_PORT = "587"
SMTP_USERNAME = ""
SMTP_PASSWORD = ""

# Integrations
TELEGRAM_BOT_TOKEN = ""
TELEGRAM_BOT_WEBHOOK_SECRET = ""
WEBHOOK_URL = ""
WEBHOOK_SECRET = ""
FORWARD_ADDRESS_LIST = ""

# Browser origins allowed for CORS (comma-separated)
APP_ORIGINS = "http://localhost:5173"

# S3/Storage Configuration (alternative to R2)
S3_REGION = ""
S3_ENDPOINT = ""
S3_ACCESS_KEY_ID = ""
S3_SECRET_ACCESS_KEY = ""
S3_BUCKET = ""

# Attachment Configuration
REMOVE_ALL_ATTACHMENT = "false"
REMOVE_EXCEED_SIZE_ATTACHMENT = "false"
MAX_ATTACHMENT_SIZE = "5242880"

# OAuth2 Providers (JSON array)
OAUTH2_PROVIDERS = '[]'

# Debug
DEBUG_MODE = "false"

# ============================================
# CRON TRIGGERS (Scheduled Tasks)
# ============================================
[triggers]
crons = ["0 0 * * *"]

# ============================================
# DEVELOPMENT SERVER CONFIG
# ============================================
[dev]
port = 8787
local_protocol = "http"
